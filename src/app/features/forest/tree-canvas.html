<svg
  #svg
  class="canvas"
  role="tree"
  [attr.aria-label]="i18n.t().a11y.treeCanvas"
  (pointerdown)="onPointerDown($event)"
  (pointermove)="onPointerMove($event)"
  (pointerup)="onPointerUp($event)"
  (pointercancel)="onPointerUp($event)"
  (wheel)="onWheel($event)"
  (click)="onCanvasClick($event)"
>
  <defs>
    <!-- «A pleno sol»: warm pooled light behind a sunlit node's glyph -->
    <radialGradient id="sun-glow">
      <stop offset="0" class="sun-glow-core" />
      <stop offset="0.55" class="sun-glow-mid" />
      <stop offset="1" class="sun-glow-edge" />
    </radialGradient>
  </defs>
  <g [attr.transform]="transform()">
    <!-- Ground under the roots: wide soft knoll, faded edges -->
    @if (roots().length) {
      <g class="ground" aria-hidden="true">
        <ellipse
          [attr.cx]="(layout().minX + layout().width / 2)"
          [attr.cy]="groundY() + 10"
          [attr.rx]="Math.max(320, layout().width + 200)"
          ry="46"
          class="hill outer"
        />
        <ellipse
          [attr.cx]="(layout().minX + layout().width / 2)"
          [attr.cy]="groundY() + 2"
          [attr.rx]="Math.max(190, layout().width / 2 + 140)"
          ry="30"
          class="hill"
        />

        <!-- Meadow life around the base -->
        @for (g of groundDecor().grass; track $index) {
          <g class="tuft" [attr.transform]="'translate(' + g.x + ' ' + g.y + ')' + (g.flip ? ' scale(-1 1)' : '')">
            <path d="M 0 0 q -3 -12 -6 -15" />
            <path d="M 2 0 q 0 -14 1 -17" />
            <path d="M 4 0 q 4 -11 7 -13" />
          </g>
        }
        @for (f of groundDecor().flowers; track $index) {
          <g class="base-flower" [attr.transform]="'translate(' + f.x + ' ' + f.y + ') rotate(' + f.sway + ')'">
            <line x1="0" y1="0" x2="0" [attr.y2]="f.scale * 18" class="stem" />
            <g appFlower [flower]="species()" [scale]="f.scale" />
          </g>
        }
        @for (root of roots(); track root.node.id) {
          <!-- Trunk + root flare: same bark, proportional, hugging the
               swayed foot — never two pieces at the soil line (0.0.80). -->
          <path class="trunk" [attr.d]="trunkFlarePath(root)" [style.fill]="trunkFill(root)" />
          <path class="trunk" [attr.d]="trunkPath(root)" [style.fill]="trunkFill(root)" />
          <!-- Trunk grain -->
          <path
            class="bark-grain"
            [attr.d]="'M ' + (root.x - 3) + ' ' + (groundY() - 4) + ' L ' + (root.x - 2) + ' ' + (root.y + 8)"
            style="stroke-width: 2.6"
          />
          <path
            class="bark-grain"
            [attr.d]="'M ' + (root.x + 4) + ' ' + (groundY() - 6) + ' L ' + (root.x + 3) + ' ' + (root.y + 14)"
            style="stroke-width: 1.8; stroke-dashoffset: 9"
          />
          <!-- Grass tufts at the base -->
          @for (i of [0, 1, 2, 3]; track i) {
            <path
              class="grass"
              [attr.d]="'M ' + (root.x - 30 + i * 19) + ' ' + (groundY() - 4) + ' q 3 -13 7 -15'"
            />
          }
        }
      </g>
    }

    <!-- Branches: filled tapered timber -->
    @for (edge of edges(); track edge.id) {
      <g>
        <path
          class="branch"
          [class.is-new]="edge.isNew"
          [attr.d]="edge.d"
          [style.fill]="edge.fill"
        />
        <!-- Bark grain riding the limb's center line -->
        <path
          class="bark-grain"
          [attr.d]="edge.grain"
          [style.stroke-width]="edge.grainWidth"
          [style.stroke-dashoffset]="edge.grainOffset"
        />
        <!-- Foliage pads: the crown's soft volume at the tip -->
        @for (pad of edge.pads; track $index) {
          <ellipse
            class="pad"
            [class.is-new]="edge.isNew"
            [class.sh1]="pad.shade === 1"
            [class.sh2]="pad.shade === 2"
            [attr.cx]="pad.x"
            [attr.cy]="pad.y"
            [attr.rx]="pad.rx"
            [attr.ry]="pad.ry"
            [attr.transform]="'rotate(' + pad.rot + ' ' + pad.x + ' ' + pad.y + ')'"
            aria-hidden="true"
          />
        }
        <!-- Little leaves along the branch -->
        @for (leaf of edge.leaves; track $index) {
          <g
            class="leaf"
            [class.is-new]="edge.isNew"
            [class.sh1]="leaf.shade === 1"
            [class.sh2]="leaf.shade === 2"
            [attr.transform]="'translate(' + leaf.x + ' ' + leaf.y + ') rotate(' + leaf.angle + ')'"
            aria-hidden="true"
          >
            @if (leaf.kind === 'leaf') {
              @switch (leaf.variant) {
                @case (1) {
                  <!-- willow: slim and long -->
                  <path [attr.d]="'M 0 0 Q ' + leaf.size * 0.55 + ' ' + (-leaf.size) + ' 0 ' + (-2.15 * leaf.size) + ' Q ' + (-leaf.size * 0.55) + ' ' + (-leaf.size) + ' 0 0 Z'" />
                  <path class="lit" [attr.d]="'M 0 0 Q ' + leaf.size * 0.55 + ' ' + (-leaf.size) + ' 0 ' + (-2.15 * leaf.size) + ' Q ' + (leaf.size * 0.2) + ' ' + (-leaf.size) + ' 0 0 Z'" />
                }
                @case (2) {
                  <!-- round and chubby -->
                  <path [attr.d]="'M 0 0 Q ' + leaf.size * 1.25 + ' ' + (-leaf.size * 0.8) + ' 0 ' + (-1.6 * leaf.size) + ' Q ' + (-leaf.size * 1.25) + ' ' + (-leaf.size * 0.8) + ' 0 0 Z'" />
                  <path class="lit" [attr.d]="'M 0 0 Q ' + leaf.size * 1.25 + ' ' + (-leaf.size * 0.8) + ' 0 ' + (-1.6 * leaf.size) + ' Q ' + (leaf.size * 0.4) + ' ' + (-leaf.size * 0.8) + ' 0 0 Z'" />
                }
                @case (3) {
                  <!-- asymmetric: one cheek fuller -->
                  <path [attr.d]="'M 0 0 Q ' + leaf.size * 1.15 + ' ' + (-leaf.size * 0.85) + ' 0 ' + (-2 * leaf.size) + ' Q ' + (-leaf.size * 0.65) + ' ' + (-leaf.size * 1.15) + ' 0 0 Z'" />
                  <path class="lit" [attr.d]="'M 0 0 Q ' + leaf.size * 1.15 + ' ' + (-leaf.size * 0.85) + ' 0 ' + (-2 * leaf.size) + ' Q ' + (leaf.size * 0.36) + ' ' + (-leaf.size) + ' 0 0 Z'" />
                }
                @default {
                  <!-- almond -->
                  <path [attr.d]="'M 0 0 Q ' + leaf.size + ' ' + (-leaf.size) + ' 0 ' + (-2 * leaf.size) + ' Q ' + (-leaf.size) + ' ' + (-leaf.size) + ' 0 0 Z'" />
                  <path class="lit" [attr.d]="'M 0 0 Q ' + leaf.size + ' ' + (-leaf.size) + ' 0 ' + (-2 * leaf.size) + ' Q ' + (leaf.size * 0.34) + ' ' + (-leaf.size) + ' 0 0 Z'" />
                }
              }
            } @else {
              <g appFlower [flower]="species()" [scale]="0.42" />
            }
          </g>
        }
      </g>
    }

    <!-- Nodes -->
    @for (point of layout().points; track point.node.id) {
      <g
        class="node"
        role="treeitem"
        [attr.data-node-id]="point.node.id"
        [attr.transform]="'translate(' + point.x + ' ' + point.y + ')'"
        [attr.aria-level]="point.depth + 1"
        [attr.aria-label]="nodeLabel(point)"
        [attr.tabindex]="focusedId() === point.node.id ? 0 : -1"
        (keydown)="onNodeKeydown($event, point)"
      >
        <!-- Cosmetic hover zone — actual taps resolve at the canvas level
             to the NEAREST node, so discs can never swallow a neighbor. -->
        <circle class="hit" [attr.r]="hitRadius()" fill="transparent" />

        <!-- «A pleno sol»: a REAL sun — bright pooled light + defined rays,
             pooled under everything else. Unmissable on purpose (ADHD-first). -->
        @if (lightOf(point) === 'sunlit') {
          <circle class="light-halo" r="40" fill="url(#sun-glow)" aria-hidden="true" />
          <g class="sun-rays" aria-hidden="true">
            @for (angle of [0, 45, 90, 135, 180, 225, 270, 315]; track angle) {
              <path
                d="M 0 -28 L 2.6 -39 L -2.6 -39 Z"
                [attr.transform]="'rotate(' + angle + ')'"
              />
            }
          </g>
        }

        <!-- Focus ring (drawn — SVG has no native outline) -->
        @if (focusedId() === point.node.id) {
          <circle class="focus-ring" r="24" fill="none" />
        }

        <!-- "You are here" halo — wherever the owner pinned it -->
        @if (tree().currentNodeId === point.node.id) {
          <circle class="here-halo" r="19" fill="none" />
        }

        <!-- Status glyph. A pending RITUAL (0.0.104) shows the spiral with
             star dust instead of its seed/capullo — «esta rama respira en
             ciclos»; the same symbol you walk in the almanaque. Achieved/
             resting/branched keep their ordinary glyphs. -->
        @if (isRitual(point.node) && (point.node.status === 'seed' || point.node.status === 'growing')) {
          <g class="glyph ritual-spiral">
            <g appSpiral [tint]="species().petalEdge" [scale]="1.2" />
          </g>
        } @else {
        @switch (point.node.status) {
          @case ('achieved') {
            <g class="glyph flower">
              <g appFlower [flower]="species()" [scale]="1.05" />
            </g>
          }
          @case ('branched') {
            <g class="glyph knot" [style.color]="statusColor(point.node)">
              <circle r="14" class="knot-halo" />
              <circle r="10" class="knot-ring" />
              <circle r="4" fill="currentColor" />
            </g>
          }
          @case ('resting') {
            <g class="glyph" [style.color]="statusColor(point.node)">
              <circle r="7" fill="currentColor" opacity="0.35" />
              <path d="M -5 2 Q 0 -8 5.5 -2 Q 1 5.5 -5 2 Z" fill="currentColor" />
              <path d="M -5 2 Q 0.5 -2.5 5.5 -2" fill="none" stroke="var(--surface)" stroke-width="0.9" opacity="0.7" />
            </g>
          }
          @case ('growing') {
            <!-- El capullo: the tree's own flower, still closed as a bell —
                 it will OPEN into the species bloom when the branch achieves.
                 Leans along the limb it grows from, like a real bud. -->
            <g
              class="glyph capullo"
              [attr.transform]="'rotate(' + saplingAngle(point) + ')' + glyphScale(point)"
            >
              <path class="capullo-stem" d="M 0 8 C 0.3 5 0.4 3 0.3 1" />
              <g transform="translate(0 1)">
                <path
                  class="capullo-body"
                  d="M 0 2 C -5.2 -3.5 -4.6 -11.5 0 -14 C 4.6 -11.5 5.2 -3.5 0 2 Z"
                  [attr.fill]="species().petal"
                  [attr.stroke]="species().petalEdge"
                  stroke-width="0.8"
                />
                <path
                  class="capullo-seam"
                  d="M 0 -13 C 0.8 -8 0.8 -3 0 1"
                  fill="none"
                  [attr.stroke]="species().petalEdge"
                  stroke-width="0.7"
                  opacity="0.55"
                />
                <ellipse cx="0" cy="1" rx="1.7" ry="1.1" [attr.fill]="species().heart" opacity="0.9" />
                <path class="capullo-sepal" d="M 0 2 Q -4.6 0 -5.6 -4.6 Q -1.6 -2.8 0 0.6 Z" />
                <path class="capullo-sepal" d="M 0 2 Q 4.6 0 5.6 -4.6 Q 1.6 -2.8 0 0.6 Z" />
              </g>
            </g>
          }
          @default {
            <g class="glyph seed" [attr.transform]="glyphScale(point) || null">
              <circle r="5.5" [attr.fill]="species().petalEdge" />
              <path
                d="M 0 -5 Q 1.5 -10 5 -11"
                fill="none"
                [attr.stroke]="species().petalEdge"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </g>
          }
        }
        }

        <!-- «A la sombra»: a clearly visible leaf canopy ARCHED over the
             node — an ADDED kindness, never a dimming of the branch. The
             paper note keeps its spot at (13,-21); the parasol arcs higher. -->
        @if (lightOf(point) === 'shade') {
          <g class="sombrilla" transform="translate(0 -24)" aria-hidden="true">
            <path class="shade-leaf" d="M 0 0 Q 7 -7 0 -14 Q -7 -7 0 0 Z" transform="translate(-13 2) rotate(-52)" />
            <path class="shade-leaf mid" d="M 0 0 Q 7.6 -7.6 0 -15.2 Q -7.6 -7.6 0 0 Z" transform="translate(-4 -2) rotate(-18)" />
            <path class="shade-leaf mid" d="M 0 0 Q 7.6 -7.6 0 -15.2 Q -7.6 -7.6 0 0 Z" transform="translate(5 -2) rotate(16)" />
            <path class="shade-leaf far" d="M 0 0 Q 7 -7 0 -14 Q -7 -7 0 0 Z" transform="translate(14 2) rotate(50)" />
          </g>
        }

        <!-- A little folded leaf of paper: this branch keeps written words -->
        @if (point.node.note.trim()) {
          <g
            class="note-mark"
            transform="translate(13 -21)"
            aria-hidden="true"
            (pointerenter)="onMarkEnter($event, point)"
            (pointerleave)="onMarkLeave($event)"
            (click)="$event.stopPropagation(); toggleLetter(point)"
          >
            <rect class="mark-hit" x="-4" y="-4" width="18.5" height="17.5" fill="transparent" />
            <path class="paper" d="M0 0 L7.5 0 L10.5 3 L10.5 9.5 L0 9.5 Z" />
            <path class="fold" d="M7.5 0 L7.5 3 L10.5 3 Z" />
            <path class="line" d="M2.2 4.6 H8.4" />
            <path class="line" d="M2.2 6.8 H6.6" />
          </g>
        }

        <!-- Title tag: multi-line, packed globally — never hidden by zoom or
             crowding, never colliding (tree-labels.ts). The focused node's
             packed label yields to the full cartouche painted on top. -->
        @if (labelFor(point); as block) {
          @if (focusedId() !== point.node.id) {
            <g class="tag" aria-hidden="true">
              @if (pillFor(point, block); as pill) {
                <rect
                  class="label-pill"
                  [class.sun]="pill.kind === 'sun'"
                  [class.shade]="pill.kind === 'shade'"
                  [attr.x]="pill.x"
                  [attr.y]="pill.y"
                  [attr.width]="pill.w"
                  [attr.height]="pill.h"
                  rx="8"
                />
              }
              @if (lightOf(point) === 'sunlit') {
                <g
                  class="rayito"
                  [attr.transform]="'translate(' + (block.cx - point.x - block.width / 2 + 4) + ' ' + (block.y0 - point.y - 4) + ')'"
                >
                  <path d="M 0 -5.4 V -2.4 M 3.8 -3.8 L 1.7 -1.7 M 5.4 0 H 2.4 M 3.8 3.8 L 1.7 1.7 M 0 5.4 V 2.4 M -3.8 3.8 L -1.7 1.7 M -5.4 0 H -2.4 M -3.8 -3.8 L -1.7 -1.7" />
                  <circle r="1.3" />
                </g>
              }
              <text
                class="title"
                [class.in-pill]="pillFor(point, block) !== null"
                [class.in-sun]="lightOf(point) === 'sunlit'"
                [class.in-shade]="lightOf(point) === 'shade'"
                text-anchor="middle"
                [style.font-size.px]="12.5 * block.factor"
                [attr.y]="block.y0 - point.y"
              >
                @for (line of block.lines; track $index) {
                  <tspan [attr.x]="block.cx - point.x" [attr.dy]="$index === 0 ? 0 : '1.08em'">{{ line }}</tspan>
                }
                @if (block.tail) {
                  <tspan class="fade-tail">{{ block.tail }}</tspan>
                }
              </text>
            </g>
          }
        }

        <!-- "+" bud: plant a branch right here (focused node only) -->
        @if (focusedId() === point.node.id) {
          <g
            class="plant-bud"
            role="button"
            [attr.aria-label]="i18n.t().node.plantChild"
            [attr.transform]="budTransform(point)"
            (click)="$event.stopPropagation(); plantRequested.emit(point.node)"
            (keydown.enter)="$event.stopPropagation(); plantRequested.emit(point.node)"
            tabindex="-1"
          >
            <!-- Counter-scaled so the bud stays finger-sized when zoomed out -->
            <circle class="bud-hit" [attr.r]="budHitRadius()" fill="transparent" />
            <circle r="14" class="bud-bg" />
            <path d="M -5.5 0 H 5.5 M 0 -5.5 V 5.5" class="bud-plus" />
          </g>
        }
      </g>
    }

    <!-- «La cosecha»: the one-shot fruit drop of a just-bloomed branch.
         The outer group carries the attr translate and animates OPACITY
         only (a transform animation here would clobber the translate);
         fall and drift live on the inner groups. -->
    @for (drop of fruitDrops(); track drop.key) {
      <g
        class="fruit-drop"
        aria-hidden="true"
        [attr.transform]="'translate(' + drop.x + ' ' + drop.y + ')'"
        [style.--fall]="drop.fall + 'px'"
        [style.--drift]="drop.drift + 'px'"
      >
        <g class="fruit-fall">
          <g class="fruit-swing">
            <g appFruit [fruit]="drop.spec" [scale]="0.9" />
          </g>
        </g>
      </g>
    }

    <!-- Focused name — the FULL title, painted last (on top). Tabbing shows
         it here instead of reflowing the packed label field. -->
    @if (focusTag(); as tag) {
      <g
        class="tag focus-tag"
        aria-hidden="true"
        [attr.transform]="'translate(' + tag.point.x + ' ' + tag.point.y + ')'"
      >
        <text
          class="title"
          text-anchor="middle"
          [style.font-size.px]="12.5 * tag.factor"
          [attr.y]="tag.yRel"
        >
          @for (line of tag.lines; track $index) {
            <tspan x="0" [attr.dy]="$index === 0 ? 0 : '1.08em'">{{ line }}</tspan>
          }
        </text>
      </g>
    }
  </g>
</svg>

<div class="zoom-actions">
  <button type="button" class="btn btn-soft zoom-btn" (click)="zoomBy(1.3)" [attr.aria-label]="i18n.t().tree.zoomIn">+</button>
  <button type="button" class="btn btn-soft zoom-btn" (click)="zoomBy(1 / 1.3)" [attr.aria-label]="i18n.t().tree.zoomOut">−</button>
</div>

<button type="button" class="btn btn-soft center-btn" (click)="fitTree()">
  ⌖ {{ i18n.t().tree.center }}
</button>

<!-- The little letter: hover a paper leaf and the note opens right there -->
@if (hoverNote(); as hover) {
  <div class="note-letter" [style.left.px]="letterPos()?.x" [style.top.px]="letterPos()?.y">
    <span class="who">🍃 {{ hover.node.title }}</span>
    <p class="words">«{{ hover.node.note.trim() }}»</p>
  </div>
}

<!-- The parakeet perches on the ramita you're working on — constant size,
     rides the branch through pan/zoom. No twig: it stands on real wood. -->
@if (perchPoint(); as pp) {
  <a
    class="session-perch on-branch"
    routerLink="/timer"
    [style.left.px]="pp.x"
    [style.top.px]="pp.y"
    [attr.aria-label]="i18n.t().timer.title"
  >
    <app-perch-body />
  </a>
}

<div class="sr-live" aria-live="polite">
  @if (focusedId(); as id) {
    @if (layout().byId.get(id); as point) {
      {{ nodeLabel(point) }}
    }
  }
</div>
