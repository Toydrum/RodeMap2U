name: Deploy frontend to AWS dev

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-aws-dev
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.AWS_DEPLOY_ENABLED == 'true' && vars.AWS_ROLLBACK_ENABLED == 'false' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: dev
      url: ${{ steps.ssm.outputs.frontend_url }}
    env:
      STAGE: dev
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      RELEASE_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Require the exact main commit
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          git fetch origin main
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 26
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: roadmap2u-frontend-dev-${{ github.run_id }}
          aws-region: us-east-1
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Validate the assumed AWS identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(aws sts get-caller-identity --query Account --output text)" = "$AWS_ACCOUNT_ID"

      - name: Read the backend handoff from SSM
        id: ssm
        shell: bash
        run: |
          set -euo pipefail
          get_parameter() {
            aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text
          }
          BACKEND_RELEASE_SHA="$(get_parameter "/roadmap2u/${STAGE}/backend-release-sha")"
          [[ "$BACKEND_RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'The active backend release is not an exact lowercase commit SHA.' >&2
            exit 1
          }
          BACKEND_RELEASE_MARKER="$(get_parameter "/roadmap2u/${STAGE}/backend-releases/$BACKEND_RELEASE_SHA")"
          test "$BACKEND_RELEASE_MARKER" = "$BACKEND_RELEASE_SHA"
          {
            echo "region=$(get_parameter "/roadmap2u/${STAGE}/region")"
            echo "user_pool_id=$(get_parameter "/roadmap2u/${STAGE}/user-pool-id")"
            echo "user_pool_client_id=$(get_parameter "/roadmap2u/${STAGE}/user-pool-client-id")"
            echo "api_base_url=$(get_parameter "/roadmap2u/${STAGE}/api-base-url")"
            echo "frontend_bucket=$(get_parameter "/roadmap2u/${STAGE}/frontend-bucket")"
            echo "distribution_id=$(get_parameter "/roadmap2u/${STAGE}/cloudfront-distribution-id")"
            echo "frontend_url=$(get_parameter "/roadmap2u/${STAGE}/frontend-url")"
            echo "contract_hash=$(get_parameter "/roadmap2u/${STAGE}/contract-hash")"
            echo "backend_release_sha=$BACKEND_RELEASE_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize the verified release pair
        shell: bash
        env:
          BACKEND_RELEASE_SHA: ${{ steps.ssm.outputs.backend_release_sha }}
          CONTRACT_HASH: ${{ steps.ssm.outputs.contract_hash }}
        run: |
          {
            echo '### Verified release pair'
            echo "- Backend SHA: \`$BACKEND_RELEASE_SHA\`"
            echo "- Frontend SHA: \`$RELEASE_SHA\`"
            echo "- Contract hash: \`$CONTRACT_HASH\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate the deployment target and CloudFront binding
        shell: bash
        env:
          ROADMAP2U_STAGE: dev
          ROADMAP2U_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          ROADMAP2U_FRONTEND_BUCKET: ${{ steps.ssm.outputs.frontend_bucket }}
          ROADMAP2U_DISTRIBUTION_ID: ${{ steps.ssm.outputs.distribution_id }}
          ROADMAP2U_FRONTEND_URL: ${{ steps.ssm.outputs.frontend_url }}
          ROADMAP2U_API_BASE_URL: ${{ steps.ssm.outputs.api_base_url }}
          ROADMAP2U_RELEASE_SHA: ${{ github.sha }}
          SITE_BUCKET: ${{ steps.ssm.outputs.frontend_bucket }}
          DISTRIBUTION_ID: ${{ steps.ssm.outputs.distribution_id }}
          FRONTEND_URL: ${{ steps.ssm.outputs.frontend_url }}
        run: |
          set -euo pipefail
          node tools/validate-deployment-target.mjs
          bash tools/validate-aws-binding.sh

      - name: Generate and validate the dev config
        env:
          ROADMAP2U_STAGE: dev
          ROADMAP2U_REGION: ${{ steps.ssm.outputs.region }}
          ROADMAP2U_USER_POOL_ID: ${{ steps.ssm.outputs.user_pool_id }}
          ROADMAP2U_USER_POOL_CLIENT_ID: ${{ steps.ssm.outputs.user_pool_client_id }}
          ROADMAP2U_API_BASE_URL: ${{ steps.ssm.outputs.api_base_url }}
          ROADMAP2U_CONTRACT_HASH: ${{ steps.ssm.outputs.contract_hash }}
        run: npm run generate:config

      - name: Test and build the root-hosted PWA
        run: |
          npm run test:config
          npm test -- --watch=false
          npm run build -- --base-href /

      - name: Validate the built PWA
        run: node tools/validate-built-pwa.mjs --build-dir dist/roadmap2u/browser

      - name: Keep AWS adapters out of the initial bundle
        shell: bash
        run: |
          set -euo pipefail
          if grep -E -i 'cognito-idp|amazonaws[.]com|aws-amplify|Cognito' dist/roadmap2u/browser/main-*.js; then
            echo 'AWS provider signature leaked into the initial bundle.' >&2
            exit 1
          fi

      - name: Publish assets and versioned mutable entrypoints
        shell: bash
        env:
          BUILD_DIR: dist/roadmap2u/browser
          SITE_BUCKET: ${{ steps.ssm.outputs.frontend_bucket }}
          DISTRIBUTION_ID: ${{ steps.ssm.outputs.distribution_id }}
        run: bash tools/publish-aws-site.sh

      - name: Smoke the dev host and API boundary
        env:
          FRONTEND_URL: ${{ steps.ssm.outputs.frontend_url }}
          API_BASE_URL: ${{ steps.ssm.outputs.api_base_url }}
        run: node tools/smoke-frontend.mjs --frontend-url "$FRONTEND_URL" --api-base-url "$API_BASE_URL" --cors-origin "$FRONTEND_URL"

      - name: Record the successful dev release
        shell: bash
        run: |
          set -euo pipefail
          aws ssm put-parameter \
            --name "/roadmap2u/${STAGE}/frontend-releases/$RELEASE_SHA" \
            --type String \
            --value "$RELEASE_SHA" \
            --overwrite
          aws ssm put-parameter \
            --name "/roadmap2u/${STAGE}/frontend-release-sha" \
            --type String \
            --value "$RELEASE_SHA" \
            --overwrite
