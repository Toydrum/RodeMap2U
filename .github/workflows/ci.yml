name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate deployment configuration contracts
        run: npm run test:config

      - name: Run application tests
        run: npm test -- --watch=false

      - name: Build the root-hosted PWA
        run: npm run build -- --base-href /

      - name: Validate the built PWA
        run: node tools/validate-built-pwa.mjs --build-dir dist/roadmap2u/browser

      - name: Keep AWS adapters out of the initial bundle
        shell: bash
        run: |
          set -euo pipefail
          if grep -E -i 'cognito-idp|amazonaws[.]com|aws-amplify|Cognito' dist/roadmap2u/browser/main-*.js; then
            echo 'AWS provider signature leaked into the initial bundle.' >&2
            exit 1
          fi
