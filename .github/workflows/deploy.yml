name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base-href /RodeMap2U/

      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/rodemap2u/browser/index.html dist/rodemap2u/browser/404.html
          touch dist/rodemap2u/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/rodemap2u/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          # first-time Pages provisioning can exceed the default 10-min queue timeout
          timeout: 1200000

      # Pages occasionally rejects a deployment with "try again later" —
      # one in-run retry after a pause absorbs the flake.
      - name: Pause before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 1200000
