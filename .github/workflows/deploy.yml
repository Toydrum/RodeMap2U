name: Legacy GitHub Pages (manual only)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build
        run: npm run build -- --base-href /RoadMap2U/

      - name: SPA fallback + disable Jekyll
        run: |
          node tools/prepare-pages-artifact.mjs dist/roadmap2u/browser
          cp dist/roadmap2u/browser/index.html dist/roadmap2u/browser/404.html
          touch dist/roadmap2u/browser/.nojekyll

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist/roadmap2u/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        continue-on-error: true
        with:
          # first-time Pages provisioning can exceed the default 10-min queue timeout
          timeout: 1200000

      # Pages occasionally rejects a deployment with "try again later" —
      # one in-run retry after a pause absorbs the flake.
      - name: Pause before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        with:
          timeout: 1200000
