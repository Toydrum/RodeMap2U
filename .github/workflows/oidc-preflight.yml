name: Verify frontend AWS OIDC
run-name: Verify frontend OIDC for ${{ inputs.stage }}

on:
  workflow_dispatch:
    inputs:
      stage:
        description: GitHub Environment whose AWS role will be verified
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write

jobs:
  identity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: ${{ inputs.stage }}
    steps:
      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: roadmap2u-frontend-preflight-${{ inputs.stage }}-${{ github.run_id }}
          aws-region: us-east-1
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Validate the assumed AWS identity
        shell: bash
        env:
          EXPECTED_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          read -r ACCOUNT ARN USER_ID <<< "$(aws sts get-caller-identity --query '[Account,Arn,UserId]' --output text)"
          test "$ACCOUNT" = "$EXPECTED_ACCOUNT_ID"
          {
            echo "### OIDC preflight: ${{ inputs.stage }}"
            echo "- Account: \`$ACCOUNT\`"
            echo "- Principal: \`$ARN\`"
            echo "- Session: \`$USER_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"
